[project]
name = "ai-os-shared"
version = "0.1.0"
description = "Industry AI OS — shared platform spine: tenant context, auth, DB+RLS, authz, audit, telemetry, LLM config."
requires-python = ">=3.11"
dependencies = [
    "fastapi>=0.111",
    "pydantic>=2.7",
    "pydantic-settings>=2.3",
    "sqlalchemy[asyncio]>=2.0.30",
    "asyncpg>=0.29",
    "psycopg[binary]>=3.1",
    "alembic>=1.13",
    "pgvector>=0.3",
    "httpx>=0.27",
    "python-jose[cryptography]>=3.3",
    "PyJWT>=2.8",
    "opentelemetry-api>=1.25",
    "opentelemetry-sdk>=1.25",
    "opentelemetry-exporter-otlp>=1.25",
    "opentelemetry-instrumentation-fastapi>=0.46b0",
    "structlog>=24.1",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/ai_os_shared"]
