# Infrastructure-only stack for the Industry AI OS platform.
# `make up-infra` starts just these, for fast service iteration. The full stack
# (deploy/docker-compose.yml) includes this file and adds the application services.
#
# On a fresh machine, everything here comes up with health checks and no secrets
# required (LLM keys are optional). Data persists in named volumes.

name: aios

networks:
  aios:
    driver: bridge

volumes:
  pgdata:
  miniodata:

services:
  # ---------------------------------------------------------------- Postgres
  postgres:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-aios}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-aios}
      POSTGRES_DB: ${POSTGRES_DB:-aios}
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./postgres/init:/docker-entrypoint-initdb.d:ro
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-aios} -d ${POSTGRES_DB:-aios}"]
      interval: 5s
      timeout: 5s
      retries: 20
    networks: [aios]

  # ---------------------------------------------------------------- Keycloak
  keycloak:
    image: quay.io/keycloak/keycloak:26.0
    command: ["start-dev", "--import-realm"]
    environment:
      KC_BOOTSTRAP_ADMIN_USERNAME: ${KEYCLOAK_ADMIN:-admin}
      KC_BOOTSTRAP_ADMIN_PASSWORD: ${KEYCLOAK_ADMIN_PASSWORD:-admin}
      KC_DB: postgres
      KC_DB_URL: jdbc:postgresql://postgres:5432/keycloak
      KC_DB_USERNAME: ${POSTGRES_USER:-aios}
      KC_DB_PASSWORD: ${POSTGRES_PASSWORD:-aios}
      KC_FEATURES: organization
      KC_HEALTH_ENABLED: "true"
      KC_HOSTNAME: http://localhost:8081
      KC_HOSTNAME_STRICT: "false"
      KC_HTTP_ENABLED: "true"
    volumes:
      - ./keycloak/realm-export.json:/opt/keycloak/data/import/realm-export.json:ro
    ports:
      - "8081:8080"
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test:
        - "CMD-SHELL"
        - "exec 3<>/dev/tcp/localhost/9000; echo -e 'GET /health/ready HTTP/1.1\r\nHost: localhost\r\nConnection: close\r\n\r\n' >&3; cat <&3 | grep -q 'UP'"
      interval: 10s
      timeout: 5s
      retries: 30
      start_period: 60s
    networks: [aios]

  # ------------------------------------------------------------------ Cerbos
  cerbos:
    image: ghcr.io/cerbos/cerbos:0.42.0
    command: ["server", "--config=/config/config.yaml"]
    volumes:
      - ./cerbos/config.yaml:/config/config.yaml:ro
      - ./cerbos/policies:/policies:ro
    ports:
      - "3592:3592"
      - "3593:3593"
    healthcheck:
      test: ["CMD", "/cerbos", "healthcheck", "--config=/config/config.yaml"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 10s
    networks: [aios]

  # ------------------------------------------------------------------- MinIO
  minio:
    image: minio/minio:latest
    command: ["server", "/data", "--console-address", ":9001"]
    environment:
      MINIO_ROOT_USER: ${MINIO_ACCESS_KEY:-aios}
      MINIO_ROOT_PASSWORD: ${MINIO_SECRET_KEY:-aios12345}
    volumes:
      - miniodata:/data
    ports:
      - "9000:9000"
      - "9001:9001"
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 10s
    networks: [aios]

  # Create the documents bucket once MinIO is up.
  minio-init:
    image: minio/mc:latest
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
      mc alias set local http://minio:9000 ${MINIO_ACCESS_KEY:-aios} ${MINIO_SECRET_KEY:-aios12345} &&
      mc mb --ignore-existing local/${MINIO_BUCKET:-aios-documents} &&
      echo 'bucket ready';
      "
    networks: [aios]

  # ------------------------------------------------------------ Redis/Valkey
  redis:
    image: valkey/valkey:8
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "valkey-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10
    networks: [aios]

  # -------------------------------------------------------------------- NATS
  nats:
    image: nats:2.10
    command: ["-js", "-m", "8222"]
    ports:
      - "4222:4222"
      - "8222:8222"
    healthcheck:
      test:
        - "CMD-SHELL"
        - "exec 3<>/dev/tcp/localhost/8222; echo -e 'GET /healthz HTTP/1.1\r\nHost: localhost\r\nConnection: close\r\n\r\n' >&3; cat <&3 | grep -q 'ok'"
      interval: 10s
      timeout: 5s
      retries: 10
    networks: [aios]

  # ---------------------------------------------------------------- Temporal
  temporal:
    image: temporalio/auto-setup:1.25.0
    environment:
      DB: postgres12
      DB_PORT: 5432
      POSTGRES_USER: ${POSTGRES_USER:-aios}
      POSTGRES_PWD: ${POSTGRES_PASSWORD:-aios}
      POSTGRES_SEEDS: postgres
      DBNAME: temporal
      VISIBILITY_DBNAME: temporal_visibility
    ports:
      - "7233:7233"
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "tctl", "--address", "temporal:7233", "cluster", "health"]
      interval: 10s
      timeout: 5s
      retries: 20
      start_period: 30s
    networks: [aios]

  temporal-ui:
    image: temporalio/ui:2.31.2
    environment:
      TEMPORAL_ADDRESS: temporal:7233
      TEMPORAL_CORS_ORIGINS: http://localhost:3000
    ports:
      - "8088:8080"
    depends_on:
      temporal:
        condition: service_healthy
    networks: [aios]

  # ---------------------------------------------------------------- Langfuse
  langfuse:
    image: langfuse/langfuse:2
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-aios}:${POSTGRES_PASSWORD:-aios}@postgres:5432/langfuse
      NEXTAUTH_URL: http://localhost:3000
      NEXTAUTH_SECRET: dev-langfuse-nextauth-secret
      SALT: dev-langfuse-salt
      TELEMETRY_ENABLED: "false"
    ports:
      - "3000:3000"
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test:
        - "CMD-SHELL"
        - "exec 3<>/dev/tcp/localhost/3000; echo -e 'GET /api/public/health HTTP/1.1\r\nHost: localhost\r\nConnection: close\r\n\r\n' >&3; cat <&3 | grep -q '200'"
      interval: 15s
      timeout: 5s
      retries: 20
      start_period: 40s
    networks: [aios]

  # ----------------------------------------------------------------- LiteLLM
  litellm:
    image: ghcr.io/berriai/litellm:main-stable
    command: ["--config", "/app/config.yaml", "--port", "4000"]
    environment:
      LITELLM_MASTER_KEY: ${LITELLM_MASTER_KEY:-sk-aios-master}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      LANGFUSE_HOST: http://langfuse:3000
      LANGFUSE_PUBLIC_KEY: ${LANGFUSE_PUBLIC_KEY:-}
      LANGFUSE_SECRET_KEY: ${LANGFUSE_SECRET_KEY:-}
    volumes:
      - ./litellm/config.yaml:/app/config.yaml:ro
    ports:
      - "4000:4000"
    healthcheck:
      test:
        - "CMD-SHELL"
        - "exec 3<>/dev/tcp/localhost/4000; echo -e 'GET /health/liveliness HTTP/1.1\r\nHost: localhost\r\nConnection: close\r\n\r\n' >&3; cat <&3 | grep -q '200\\|alive'"
      interval: 15s
      timeout: 5s
      retries: 10
      start_period: 20s
    networks: [aios]

  # ---------------------------------------------------------- OTel Collector
  otel-collector:
    image: otel/opentelemetry-collector-contrib:0.109.0
    command: ["--config=/etc/otel/collector-config.yaml"]
    volumes:
      - ./otel/collector-config.yaml:/etc/otel/collector-config.yaml:ro
    ports:
      - "4317:4317"
      - "4318:4318"
    networks: [aios]

  # ---------------------------------------------- Infisical (secrets) [opt-in]
  # Secrets manager for REAL environments; local dev uses .env. Opt-in via the
  # "secrets" profile so the baseline `docker-compose up` stays lean and green:
  #   docker compose --profile secrets up -d infisical
  infisical:
    image: infisical/infisical:latest-postgres
    profiles: ["secrets"]
    environment:
      DB_CONNECTION_URI: postgresql://${POSTGRES_USER:-aios}:${POSTGRES_PASSWORD:-aios}@postgres:5432/aios
      REDIS_URL: redis://redis:6379/1
      ENCRYPTION_KEY: dev0000000000000000000000000000000
      AUTH_SECRET: dev-infisical-auth-secret-change-me==
    ports:
      - "8090:8080"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks: [aios]
