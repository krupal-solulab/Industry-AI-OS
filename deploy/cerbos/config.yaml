# Cerbos PDP configuration.
# Policies are versioned files mounted read-only from ./policies — the app is
# never the source of authorization logic.
server:
  httpListenAddr: ":3592"
  grpcListenAddr: ":3593"

storage:
  driver: "disk"
  disk:
    directory: /policies
    watchForChanges: true

audit:
  enabled: true
  backend: local
  local:
    storagePath: /tmp/cerbos/audit
