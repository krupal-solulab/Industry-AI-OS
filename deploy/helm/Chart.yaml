apiVersion: v2
name: industry-ai-os
description: Industry AI OS platform — mirrors the docker-compose stack for Kubernetes.
type: application
version: 0.1.0
appVersion: "0.1.0"

# Infrastructure is provided by well-maintained community charts so on-prem/cloud
# K8s mirrors the compose stack. Toggle each via values.<name>.enabled; disable and
# point at managed equivalents (e.g. RDS, MSK) in cloud without changing app charts.
dependencies:
  - name: postgresql
    version: "15.x.x"
    repository: https://charts.bitnami.com/bitnami
    condition: postgresql.enabled
  - name: keycloak
    version: "22.x.x"
    repository: https://charts.bitnami.com/bitnami
    condition: keycloak.enabled
  - name: minio
    version: "14.x.x"
    repository: https://charts.bitnami.com/bitnami
    condition: minio.enabled
  - name: redis
    version: "20.x.x"
    repository: https://charts.bitnami.com/bitnami
    condition: redis.enabled
  - name: nats
    version: "1.x.x"
    repository: https://nats-io.github.io/k8s/helm/charts/
    condition: nats.enabled
