{{- /*
Render a Deployment + Service for every entry in .Values.services. Each app service
listens on port 8000, loads shared config from the ConfigMap, and pulls secrets from
the referenced Secret. This one template keeps all nine services DRY.
*/ -}}
{{- range $name, $svc := .Values.services }}
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ $name }}
  labels:
    app.kubernetes.io/name: {{ $name }}
    {{- include "aios.labels" $ | nindent 4 }}
spec:
  replicas: {{ $svc.replicas | default 1 }}
  selector:
    matchLabels:
      app.kubernetes.io/name: {{ $name }}
  template:
    metadata:
      labels:
        app.kubernetes.io/name: {{ $name }}
    spec:
      {{- with $.Values.global.imagePullSecrets }}
      imagePullSecrets: {{ toYaml . | nindent 8 }}
      {{- end }}
      containers:
        - name: {{ $name }}
          image: {{ include "aios.image" $ }}
          imagePullPolicy: {{ $.Values.global.image.pullPolicy }}
          # The image is built per-service (SERVICE build-arg); APP_MODULE selects
          # the ASGI app to serve. Use a per-service tag/repo if you build separately.
          env:
            - name: APP_MODULE
              value: {{ $svc.module | quote }}
            - name: SERVICE_NAME
              value: {{ $name | quote }}
          envFrom:
            - configMapRef:
                name: aios-config
            - secretRef:
                name: {{ $.Values.secretRef }}
          ports:
            - containerPort: 8000
          readinessProbe:
            httpGet: { path: /readyz, port: 8000 }
            initialDelaySeconds: 10
            periodSeconds: 10
          livenessProbe:
            httpGet: { path: /healthz, port: 8000 }
            initialDelaySeconds: 15
            periodSeconds: 20
          resources: {{ toYaml $.Values.resources | nindent 12 }}
---
apiVersion: v1
kind: Service
metadata:
  name: {{ $name }}
  labels:
    app.kubernetes.io/name: {{ $name }}
    {{- include "aios.labels" $ | nindent 4 }}
spec:
  selector:
    app.kubernetes.io/name: {{ $name }}
  ports:
    - port: 8000
      targetPort: 8000
{{- end }}
