{{- if .Values.ingress.enabled }}
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: aios-gateway
  labels:
    {{- include "aios.labels" . | nindent 4 }}
spec:
  ingressClassName: {{ .Values.ingress.className }}
  {{- if .Values.ingress.tls }}
  tls:
    - hosts: [{{ .Values.ingress.host | quote }}]
      secretName: aios-gateway-tls
  {{- end }}
  rules:
    - host: {{ .Values.ingress.host | quote }}
      http:
        paths:
          # Only the gateway is public; all other services are cluster-internal.
          - path: /
            pathType: Prefix
            backend:
              service:
                name: gateway
                port: { number: 8000 }
{{- end }}
